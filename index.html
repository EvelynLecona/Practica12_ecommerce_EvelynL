<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
    <title>Mordidas</title>
</head>
<body>
    <header class="header">
        <i class="header_icon"><img class="header__menu"src="img/Menu.png" alt="Icono Menu"></i>
        <img class="header__logo" src="img/Logo Mordidas.png" alt="Logo Mordidas">
        <i class="header_icon--secondary"><img class="header__cart" src="img/Carrito.png" alt="Icono Carrito"></i>
    </header>

    <main>
        <section class="banner">
            <h2 class="banner__title">Productos Nuevos</h2>
            <p class="banner__sub-title">Nuevos articulos de la temporada P-V 2025</p>
        </section>

        <section class="products">
            <article class="products__item">
                <img class="products__img" src="img/Chaleco ligero.png" alt="art 1">
                <h3 class="products__title">Chaleco ligero</h3>
                <p class="products__price">$250.00 MXN</p>
            </article>

            <article class="products__item">
                <img class="products__img" src="img/Camisa hawaiana.png" alt="art 2">
                <h3 class="products__title">Camisa Hawaiana</h3>
                <p class="products__price">$120.00 MXN</p>
            </article>

            <article class="products__item">
                <img class="products__img" src="img/Jersey algodon.png" alt="art 1">
                <h3 class="products__title">Jersey algodon</h3>
                <p class="products__price">$90.00 MXN</p>
            </article>
        </section>

        <section class="cart">
            <h2 class="cart__title">Carrito</h2>
            <div class="cart__item">
                <img class="cart__image" src="img/Chaleco ligero.png" alt="Carrito">
                <p class="cart__price">$250.00 MXN</p>
                <p class="cart__product-name">Chaleco ligero</p>
                <i class="cart__remove-link"><img class="cart__remove" src="img/Remover.png" alt="Remover"></i>
            </div>
            <div class="cart__item">
                <img class="cart__image" src="img/Chaleco ligero.png" alt="Carrito">
                <p class="cart__price">$250.00 MXN</p>
                <p class="cart__product-name">Chaleco ligero</p>
                <i class="cart__remove-link"><img class="cart__remove" src="img/Remover.png" alt="Remover"></i>
            </div>
        </section>
    </main>
</body>
</html>
